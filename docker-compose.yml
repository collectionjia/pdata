services:
  polymarket:
    build: .
    container_name: polymarket-markets
    restart: unless-stopped
    ports:
      # 当前运行中的镜像监听 3457；rebuild 后若日志显示 PORT=9004 可改为 "0.0.0.0:9004:9004"
      - "0.0.0.0:9004:3457"
    environment:
      PORT: "3457"
      HOST: "0.0.0.0"
      DATA_DIR: "/data"
    volumes:
      - polymarket-data:/data

volumes:
  polymarket-data: