services:
  polymarket:
    build: .
    container_name: polymarket-markets
    restart: unless-stopped
    ports:
      # 应用在容器内监听 3458
      - "0.0.0.0:9004:3458"
    environment:
      PORT: "3458"
      HOST: "0.0.0.0"
      DATA_DIR: "/data"
    volumes:
      - polymarket-data:/data

volumes:
  polymarket-data: